<!DOCTYPE html>

<html>
<head>
<title>Register</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 flex items-center justify-center min-h-screen">

<div class="bg-gray-800 p-8 rounded-xl shadow-xl w-96">

<h2 class="text-3xl font-bold text-white mb-6 text-center">
Create Account
</h2>

<form method="POST">
{% csrf_token %}

<input
name="username"
placeholder="Username"
class="w-full p-3 mb-4 rounded bg-gray-700 text-white"
/>

<input
name="password"
type="password"
placeholder="Password"
class="w-full p-3 mb-4 rounded bg-gray-700 text-white"
/>

<button class="bg-green-600 hover:bg-green-700 w-full p-3 rounded text-white font-semibold">
Register
</button>

<p class="text-gray-400 mt-4 text-center">
Already have account?
<a href="/login" class="text-blue-400">Login</a>
</p>

</form>

</div>

</body>
</html>
