<!DOCTYPE html>

<html>
<head>
<title>Feedback</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white">

<nav class="bg-gray-800 p-4 flex justify-between">
<h1 class="font-bold text-xl">Feedback</h1>
<a href="/dashboard" class="text-blue-400">Dashboard</a>
</nav>

<div class="max-w-xl mx-auto mt-10">

<div class="bg-gray-800 p-8 rounded-xl shadow">

<h2 class="text-2xl mb-4">Send Feedback</h2>

<form method="POST">
{% csrf_token %}

<input
name="name"
placeholder="Your Name"
class="w-full p-3 mb-4 rounded bg-gray-700"
/>

<textarea
name="message"
placeholder="Your Message"
class="w-full p-3 mb-4 rounded bg-gray-700"
></textarea>

<button class="bg-blue-600 hover:bg-blue-700 w-full p-3 rounded">
Submit
</button>

</form>

</div>

<div class="mt-8">

<h3 class="text-xl mb-3">Previous Feedback</h3>

{% for f in data %}

<div class="bg-gray-800 p-4 rounded mb-3">
<b>{{f.name}}</b>
<p>{{f.message}}</p>
</div>
{% endfor %}

</div>

</div>

</body>
</html>
