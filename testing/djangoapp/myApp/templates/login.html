<!DOCTYPE html>

<html>
<head>
<title>Login</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 flex items-center justify-center min-h-screen">

<div class="bg-gray-800 p-8 rounded-xl shadow-xl w-96">

<h2 class="text-3xl font-bold text-white mb-6 text-center">
Login
</h2>

<form method="POST">
{% csrf_token %}

<input
name="username"
placeholder="Username"
class="w-full p-3 mb-4 rounded bg-gray-700 text-white outline-none"
/>

<input
name="password"
type="password"
placeholder="Password"
class="w-full p-3 mb-4 rounded bg-gray-700 text-white outline-none"
/>

<button class="bg-blue-600 hover:bg-blue-700 w-full p-3 rounded text-white font-semibold">
Login
</button>

<p class="text-gray-400 mt-4 text-center">
No account?
<a href="/register" class="text-blue-400">Register</a>
</p>

</form>

</div>

</body>
</html>
